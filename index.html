<!DOCTYPE html>
<html>
  <head>
    <title>CPIS360 WebAR Lab</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs>
      <a-marker preset="hiro">
        
        <a-text value="Omar Mohammed" position="0 1.2 0" align="center" color="#FFFFFF" rotation="-90 0 0" scale="1.5 1.5 1.5"></a-text>

        <a-box position="-1 0.5 0" scale="0.5 0.5 0.5" color="#4CC3D9" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>

        <a-sphere position="0 0.5 -1" radius="0.4" color="#EF2D5E"></a-sphere>

        <a-cylinder position="1 0.5 0" radius="0.3" height="0.8" color="#FFC65D"></a-cylinder>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
