<!DOCTYPE html>
<html>
  <head>
    <title>Marker-Based WebAR Lab</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs>
      
      <a-marker preset="hiro">
        
        <a-box position="-1 0.5 0" 
               scale="0.5 0.5 0.5" 
               color="#4CC3D9" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-box>

        <a-sphere position="0 0.7 0" 
                  radius="0.4" 
                  color="#EF2D5E" 
                  animation="property: position; to: 0 1.2 0; dir: alternate; dur: 1000; loop: true">
        </a-sphere>

        <a-cylinder position="1 0.5 0" 
                    radius="0.3" 
                    height="0.8" 
                    color="#FFC65D" 
                    animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 1500; loop: true">
        </a-cylinder>

      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
